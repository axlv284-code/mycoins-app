<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analisis Bukpot | PDF Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #f8fafc;
      }
      .glass {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
    </style>
  </head>
  <body class="antialiased">
    <!-- MODAL LOGIN -->
    <div
      id="loginModal"
      class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-50 flex items-center justify-center hidden"
    >
      <div
        class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-slate-200"
      >
        <div class="text-center mb-8">
          <div
            class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4"
          >
            <i class="fa-solid fa-lock text-2xl"></i>
          </div>
          <h2 class="text-2xl font-bold text-slate-800">Login PDF Analyzer</h2>
          <p class="text-slate-500 text-sm">Gunakan akun admin untuk akses</p>
        </div>
        <div class="space-y-4">
          <input
            type="text"
            id="user"
            placeholder="Username"
            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500"
          />
          <input
            type="password"
            id="pass"
            placeholder="Password"
            class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-red-500"
          />
          <button
            onclick="handleLogin()"
            class="w-full bg-red-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-red-200 hover:bg-red-700 transition-all active:scale-95"
          >
            MASUK SISTEM
          </button>
        </div>
      </div>
    </div>

    <div class="min-h-screen p-4 md:p-8">
      <!-- HEADER -->
      <div class="max-w-7xl mx-auto flex items-center justify-between mb-8">
        <div>
          <h1 class="text-3xl font-bold text-slate-900 tracking-tight">
            FanaLyzer <span class="text-red-600">PDF Analyzer</span>
          </h1>
          <p class="text-slate-500 text-sm mt-1 italic">
            Dashboard Analisis PDF Bukpot
          </p>
        </div>
        <div class="flex items-center gap-4">
          <button
            onclick="handleLogout()"
            class="bg-white text-slate-600 px-4 py-2 rounded-xl text-xs font-bold border border-slate-200 hover:bg-red-50 hover:text-red-600 transition-all"
          >
            LOGOUT <i class="fa-solid fa-right-from-bracket ml-2"></i>
          </button>
        </div>
      </div>

      <div class="max-w-7xl mx-auto grid grid-cols-1 gap-8">
        <!-- UPLOAD SECTION -->
        <div class="glass p-8 rounded-3xl shadow-xl border border-slate-200">
          <div
            class="flex flex-col items-center justify-center py-6 border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50"
          >
            <input
              type="file"
              id="fileInput"
              class="mb-4 text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-slate-900 file:text-white hover:file:bg-slate-800"
            />
            <button
              onclick="uploadFile()"
              id="uploadBtn"
              class="bg-red-600 text-white px-10 py-3 rounded-full font-bold shadow-lg hover:bg-red-700 transition-all flex items-center gap-2"
            >
              <i class="fa-solid fa-wand-magic-sparkles"></i> ANALISIS PDF
            </button>
          </div>
        </div>

        <!-- TABLE SECTION -->
        <div
          class="glass rounded-3xl shadow-xl border border-slate-200 overflow-hidden"
        >
          <table class="w-full text-left">
            <thead>
              <tr
                class="bg-slate-900 text-white text-[11px] font-bold uppercase tracking-widest"
              >
                <th class="p-5">No Bukpot</th>
                <th class="p-5 text-center">Masa</th>
                <th class="p-5 text-right">PPH (Rp)</th>
                <th class="p-5">Pemotong</th>
              </tr>
            </thead>
            <tbody id="tabelBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // GANTI URL KE HUGGING FACE
      const API_URL = "https://axlv284-mycoins-backend.hf.space";

      // --- AUTH LOGIC ---
      function checkAuth() {
        if (!localStorage.getItem("access_token")) {
          document.getElementById("loginModal").classList.remove("hidden");
        } else {
          loadData();
        }
      }

      async function handleLogin() {
        const user = document.getElementById("user").value;
        const pass = document.getElementById("pass").value;
        const formData = new FormData();
        formData.append("username", user);
        formData.append("password", pass);

        try {
          const res = await fetch(`${API_URL}/token`, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (res.ok) {
            localStorage.setItem("access_token", data.access_token);
            location.reload();
          } else {
            alert("Login Gagal: " + (data.detail || "Username/Password salah"));
          }
        } catch (e) {
          alert(
            "Server Backend tidak merespon. Pastikan Hugging Face statusnya RUNNING.",
          );
        }
      }

      function handleLogout() {
        localStorage.removeItem("access_token");
        location.reload();
      }

      // --- DATA LOGIC ---
      async function loadData() {
        try {
          const res = await fetch(`${API_URL}/api/tagihan`);
          if (!res.ok) throw new Error("Gagal ambil data");

          const data = await res.json();
          const tbody = document.getElementById("tabelBody");

          if (!data || data.length === 0) {
            tbody.innerHTML =
              '<tr><td colspan="4" class="p-5 text-center text-slate-400">Belum ada data.</td></tr>';
            return;
          }

          tbody.innerHTML = data
            .map(
              (item) => `
                  <tr class="hover:bg-slate-50 transition-colors border-b">
                      <td class="p-5 font-bold text-slate-700">${item.nobukpot || "-"}</td>
                      <td class="p-5 text-center"><span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold">${item.masa || "-"}</span></td>
                      <td class="p-5 font-bold text-right text-red-600">Rp ${item.pph || "0"}</td>
                      <td class="p-5 text-[10px] font-bold text-slate-700 uppercase">${item.pemotong || "-"}</td>
                  </tr>
              `,
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const token = localStorage.getItem("access_token");
        if (fileInput.files.length === 0) return alert("Pilih file!");

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        const btn = document.getElementById("uploadBtn");
        btn.disabled = true;
        btn.innerHTML = "MEMPROSES...";

        try {
          const res = await fetch(`${API_URL}/api/upload`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` },
            body: formData,
          });

          if (res.ok) {
            alert("Berhasil!");
            fileInput.value = ""; // Reset input file
            loadData();
          } else {
            const errData = await res.json();
            alert("Gagal: " + (errData.detail || "Coba login ulang."));
          }
        } catch (e) {
          alert("Error koneksi ke Hugging Face!");
        } finally {
          btn.disabled = false;
          btn.innerHTML = "ANALISIS PDF";
        }
      }

      checkAuth();
    </script>
  </body>
</html>
