<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisis Bukpot | PDF Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .table-container::-webkit-scrollbar { height: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div class="min-h-screen p-4 md:p-8">
        <div class="max-w-7xl mx-auto flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Dashboard Analisis <span class="text-red-600"></span></h1>
                <p class="text-slate-500 text-sm mt-1 italic">Otomatis Analisis PDF Bukpot</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden md:block">
                    <p class="text-xs font-semibold text-slate-400 uppercase">Status Sistem</p>
                    <p class="text-sm font-bold text-green-500 flex items-center gap-1 justify-end">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Terhubung
                    </p>
                </div>
                <div class="h-10 w-10 bg-slate-200 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                    <i class="fa-solid fa-user text-slate-600"></i>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto grid grid-cols-1 gap-8">
            
            <div class="glass p-8 rounded-3xl shadow-xl border border-slate-200 transition-all hover:shadow-2xl">
                <div class="flex flex-col items-center justify-center py-6 border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50 group hover:border-red-400 transition-colors">
                    <div class="bg-red-100 text-red-600 w-16 h-16 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                    </div>
                    <h2 class="text-lg font-semibold text-slate-800">Unggah Laporan PDF</h2>
                    <p class="text-slate-500 text-sm mb-6">Pilih file bukti potong untuk analisis otomatis</p>
                    
                    <div class="flex flex-col items-center gap-4">
                        <input type="file" id="fileInput" class="block w-full text-sm text-slate-500
                            file:mr-4 file:py-2.5 file:px-6
                            file:rounded-full file:border-0
                            file:text-sm file:font-semibold
                            file:bg-slate-900 file:text-white
                            hover:file:bg-slate-800 cursor-pointer">
                        
                        <button onclick="uploadFile()" class="bg-red-600 text-white px-10 py-3 rounded-full font-bold shadow-lg shadow-red-200 hover:bg-red-700 hover:-translate-y-0.5 transition-all active:scale-95 flex items-center gap-2">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> ANALISIS PDF
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-list-check text-red-600"></i> Riwayat Analisis
                    </h3>
                    <span class="text-[10px] bg-slate-200 text-slate-600 px-3 py-1 rounded-full font-bold uppercase tracking-wider">Auto-Sync Spreadsheet</span>
                </div>
                
                <div class="table-container overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-900 text-white text-[11px] font-bold uppercase tracking-widest">
                                <th class="p-5">No Bukpot</th>
                                <th class="p-5">NPWP</th>
                                <th class="p-5 text-center">Masa Pajak</th>
                                <th class="p-5">Tgl Bukti Potong</th>
                                <th class="p-5 text-right">PPH (Rp)</th>
                                <th class="p-5">Nama Pemotong</th>
                                <th class="p-5 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
                
                <div id="emptyState" class="p-20 text-center hidden">
                    <i class="fa-solid fa-inbox text-5xl text-slate-200 mb-4"></i>
                    <p class="text-slate-400 font-medium">Belum ada data yang dianalisis</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8000";

        async function loadData() {
            try {
                const res = await fetch(`${API_URL}/api/tagihan`);
                const data = await res.json();
                const tbody = document.getElementById('tabelBody');
                const emptyState = document.getElementById('emptyState');
                
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    data.forEach(item => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-slate-50 transition-colors group">
                                <td class="p-5 font-bold text-slate-700">${item.nobukpot}</td>
                                <td class="p-5 font-mono text-xs text-slate-500">${item.npwp}</td>
                                <td class="p-5 text-center">
                                    <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-bold border border-blue-100 italic">
                                        ${item.masa}
                                    </span>
                                </td>
                                <td class="p-5 text-slate-600 text-sm">${item.tanggal}</td>
                                <td class="p-5 font-bold text-right text-red-600">Rp ${item.pph}</td>
                                <td class="p-5">
                                    <p class="text-[10px] font-bold text-slate-700 uppercase max-w-[200px] leading-tight">${item.pemotong}</p>
                                </td>
                                <td class="p-5 text-center">
                                    <button class="bg-slate-100 text-slate-600 p-2 rounded-lg hover:bg-slate-900 hover:text-white transition-all">
                                        <i class="fa-solid fa-ellipsis-vertical"></i>
                                    </button>
                                </td>
                            </tr>`;
                    });
                }
            } catch (err) { console.error("Load Error:", err); }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("Pilih file PDF terlebih dahulu!");

            // Visual feedback
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i> MEMPROSES...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const res = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
                if (res.ok) {
                    loadData();
                } else {
                    alert("Gagal menganalisis file.");
                }
            } catch (error) {
                alert("Koneksi ke server terputus!");
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // Initial Load
        loadData();
    </script>
</body>
</html>
